<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | League Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">
    <div class="shield"><span>LF</span></div>
    <div class="logo-text">
      <h1>League Finder</h1>
      <p>Find. Play. Compete.</p>
    </div>
  </div>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="leagues.html">Browse Leagues</a></li>
    <li><a href="create.html">Create League</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="login.html">Login</a></li>
  </ul>
</nav>

<section class="contact-hero">
  <h1>Contact Us</h1>
  <p>Have a question about leagues, registration, or organizing an event?</p>
</section>

<section class="contact-section">
  <form class="contact-form">
    <h2>Send a Message</h2>

    <label>Name</label>
    <input type="text" placeholder="Enter your name">

    <label>Email</label>
    <input type="email" placeholder="Enter your email">

    <label>Reason for Contact</label>
    <select title="Reason for contact">
      <option>Select one</option>
      <option>Joining a League</option>
      <option>Creating a League</option>
      <option>Technical Support</option>
      <option>General Question</option>
    </select>

    <label>Message</label>
    <textarea placeholder="Type your message here"></textarea>

    <button type="button">Submit Message</button>
  </form>
</section>

<footer>
  <p>&copy; 2026 League Finder. All rights reserved.</p>
</footer>

</body>
</html>
