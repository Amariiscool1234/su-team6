<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create League | League Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">
    <div class="shield"><span>LF</span></div>
    <div class="logo-text">
      <h1>League Finder</h1>
      <p>Find. Play. Compete.</p>
    </div>
  </div>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="leagues.html">Browse Leagues</a></li>
    <li><a href="organizer-dashboard.html">Dashboard</a></li>
    <li><a href="login.html">Logout</a></li>
  </ul>
</nav>

<section class="create-hero">
  <h1>Create a League</h1>
  <p>Post your league so players can find it, view details, and sign up.</p>
</section>

<section class="create-section">
  <form class="create-form">

    <h2>League Information</h2>

    <label for="league-name">League Name</label>
    <input id="league-name" type="text" placeholder="Ex: Greensboro Summer Basketball League" required>

    <label for="sport">Sport</label>
    <select id="sport" required>
      <option value="">Select Sport</option>
      <option>Basketball</option>
      <option>Flag Football</option>
      <option>Volleyball</option>
      <option>Soccer</option>
    </select>

    <label for="location">Location</label>
    <input id="location" type="text" placeholder="Ex: Greensboro, NC" required>

    <label for="skill-level">Skill Level</label>
    <select id="skill-level" required>
      <option value="">Select Skill Level</option>
      <option>Beginner</option>
      <option>Intermediate</option>
      <option>Competitive</option>
      <option>Recreational</option>
      <option>All Skill Levels</option>
    </select>

    <label for="start-date">Start Date</label>
    <input id="start-date" type="date" required>

    <label for="end-date">End Date</label>
    <input id="end-date" type="date" required>

    <label for="registration-fee">Registration Fee</label>
    <input id="registration-fee" type="text" placeholder="Ex: $75" required>

    <label for="max-players">Maximum Players / Teams</label>
    <input id="max-players" type="number" placeholder="Ex: 24" min="1" required>

    <label for="game-days">Game Days</label>
    <input id="game-days" type="text" placeholder="Ex: Saturdays, Wednesday Nights" required>

    <label for="league-description">League Description</label>
    <textarea id="league-description" placeholder="Describe the league, rules, age group, and what players should expect." required></textarea>

    <label for="organizer-name">Organizer Name</label>
    <input id="organizer-name" type="text" placeholder="Ex: Jordan Carter" required>

    <label for="organizer-email">Organizer Email</label>
    <input id="organizer-email" type="email" placeholder="Ex: organizer@leaguefinder.com" required>

    <button type="submit">Create League</button>

  </form>
</section>

<footer>
  <p>&copy; 2026 League Finder. All rights reserved.</p>
</footer>

</body>
</html>
